#애플리케이션 포트 설정
server.port=80

#Mysql 연걸 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#데이터베이스에 연결하기 위해 mysql jdbc driver를 설정합니다.
spring.datasource.url=jdbc:mysql://localhost:3306/shop?serverTimezone=UTC
#연결할 데이터베이스의 url, 포트번호, 데이터베이스의 이름을 입력한다.
spring.datasource.username=root
spring.datasource.password=1234

#실행되는 쿼리 콘솔 출력
spring.jpa.properties.hibernate.show_sql=ture

#콘솔창에 출력되는 쿼리를 가독성이 좋게 포멧팅
spring.jpa.properties.hibernate.format_sql=ture

#쿼리에 물음표로 출력되는 바인드 파라미터 출력
logging.level.org.hibernate.type.descriptor.sql=trace

#SQL은 표준 SQL과 DBMS 벤더에서 제공하는 SQL이 존재, 각 공급업체에서 만든 SQL을 방언이 라고 생각
#우리가 사용하는 데이터베이스는 MySQL이어서 JPA에 MySQL8Dialect를 사용하라고 알려줍니다.
#만약 데이터베이스를 오라클로 교체하더라도, 오라클의 Dialect를 설정해준다면 문제없이 애플리케이션을 구동할 수 있습니다.
spring.jpa.hibernate.ddl-auto=validate
# application.properties의 설정이 validate이면 테스트 코드 실행 시 테이블이 자동으로 생성되지 않으므로
# 테스트 환경에서는 ddl-auto를 create로 설정한다.
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#Live Reload 기능 활성화
spring.devtools.livereload.enabled=true

#Thymeleaf cache 사용 중지
spring.thymeleaf.cache=false

spring.application.name=shop

#파일 한 개당 최대 사이즈
spring.servlet.multipart.max-file-size=20MB

#요청당 최대 파일 크기
spring.servlet.multipart.max-request-size=100MB

#상품 이미지 경로
itemImgLocation=C:/project/shop/item


#리소스 업로드 경로
uploadPath=file:///C:/project/shop/

#기본 batch size 설정
spring.jpa.properties.hibernate.default_batch_fetch_size=1000
# 구매 이력을 조회할 때, 반복문에서 order.getOrderItems() 처음 실행할 때 n+1 문제를 많이 만나는데
# 성능상 이슈가 생길 수 있어 조심해서 사용해야한다.